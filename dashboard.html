<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Indian CSP Seva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Mukta:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E2A44; --ink-soft:#3A4A6B; --red:#A83232; --red-dark:#7E2424;
    --gold:#D9A441; --khaki:#E8E2D0; --khaki-dark:#DCD4BC; --paper:#FBF9F4;
    --charcoal:#2B2620; --muted:#8A8370; --success:#3E7A4C;
  }
  body.night{ --khaki:#1b1f2a; --paper:#242938; --charcoal:#EDEAE0; --khaki-dark:#333a4d; --muted:#9099b3; }
  *{box-sizing:border-box;}
  body{ margin:0; min-height:100vh; background:var(--khaki); font-family:'Mukta',sans-serif; color:var(--charcoal); transition:background .2s,color .2s; }
  .topbar{
    background:var(--ink); color:#fff; padding:14px 16px; display:flex; align-items:center;
    justify-content:space-between; position:sticky; top:0; z-index:20;
  }
  .topbar h1{ font-family:'Baloo 2',sans-serif; font-size:16px; margin:0; }
  .hamburger{ background:none; border:none; color:#fff; font-size:22px; padding:4px 8px; }
  .container{ max-width:600px; margin:0 auto; padding:16px; padding-bottom:60px; }

  .wallet-card{
    background:linear-gradient(135deg,var(--ink),var(--ink-soft)); color:#fff; border-radius:14px;
    padding:18px 20px; margin-bottom:18px; position:relative; overflow:hidden;
  }
  .wallet-card .tape{ position:absolute; top:0; left:0; right:0; height:4px;
    background:repeating-linear-gradient(90deg, var(--red), var(--red) 10px, var(--gold) 10px, var(--gold) 14px); }
  .wallet-label{ font-size:12px; opacity:.8; }
  .wallet-amt{ font-family:'Baloo 2',sans-serif; font-size:28px; font-weight:700; margin:4px 0 10px; }
  .wallet-add-btn{ background:var(--gold); color:var(--ink); border:none; padding:8px 16px; border-radius:8px; font-weight:700; font-size:13px; }

  .section-title{ font-family:'Baloo 2',sans-serif; font-size:16px; font-weight:700; color:var(--ink); margin:18px 0 10px; }
  body.night .section-title{ color:#fff; }

  .cat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .cat-card{
    background:var(--paper); border-radius:12px; padding:16px 12px; text-align:center;
    box-shadow:0 1px 2px rgba(43,38,32,0.06), 0 4px 10px rgba(43,38,32,0.06); cursor:pointer;
  }
  .cat-card .icon{ width:40px; height:40px; margin:0 auto 8px; border-radius:10px; background:var(--khaki-dark); display:flex; align-items:center; justify-content:center; font-size:18px; }
  .cat-card .cname{ font-family:'Baloo 2',sans-serif; font-weight:700; font-size:13.5px; color:var(--ink); }
  body.night .cat-card .cname{ color:#fff; }
  .cat-card .ccount{ font-size:11.5px; color:var(--muted); margin-top:2px; }

  .svc-card{
    background:var(--paper); border-radius:12px; padding:14px; margin-bottom:10px; display:flex;
    align-items:center; gap:12px; cursor:pointer; box-shadow:0 1px 2px rgba(43,38,32,0.06);
  }
  .svc-logo{ width:38px; height:38px; border-radius:9px; background:var(--khaki-dark); object-fit:cover; flex-shrink:0; }
  .svc-name{ font-family:'Baloo 2',sans-serif; font-weight:700; font-size:14.5px; color:var(--ink); }
  body.night .svc-name{ color:#fff; }
  .svc-price{ font-size:12.5px; color:var(--red); font-weight:600; }

  .back-link{ display:inline-block; margin-bottom:12px; color:var(--red); font-weight:600; font-size:13.5px; cursor:pointer; }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
  body.night .field label{ color:#c5cce0; }
  .field input{ width:100%; padding:12px 13px; border:1.5px solid var(--khaki-dark); border-radius:9px; background:var(--paper); color:var(--charcoal); font-size:14.5px; outline:none; }
  .btn{ width:100%; padding:13px; border:none; border-radius:9px; background:var(--ink); color:#fff; font-family:'Baloo 2',sans-serif; font-weight:600; font-size:15px; cursor:pointer; }
  .btn.gold{ background:linear-gradient(145deg,var(--gold),#b9832c); }

  .msg{ padding:11px 13px; border-radius:9px; font-size:13px; margin-bottom:16px; display:none; }
  .msg.error{ background:rgba(168,50,50,0.09); color:var(--red-dark); display:block; }
  .msg.success{ background:rgba(62,122,76,0.1); color:var(--success); display:block; }

  .record-card{ background:var(--paper); border-radius:12px; padding:14px; margin-bottom:10px; box-shadow:0 1px 2px rgba(43,38,32,0.06); }
  .badge{ padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge.pending{ background:rgba(217,164,65,0.2); color:#8a6416; }
  .badge.success{ background:rgba(62,122,76,0.15); color:var(--success); }
  .badge.failed{ background:rgba(168,50,50,0.12); color:var(--red-dark); }
  .mono{ font-family:'JetBrains Mono',monospace; font-size:11.5px; }

  /* Slide menu */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:30; display:none; }
  .overlay.show{ display:block; }
  .drawer{
    position:fixed; top:0; right:-280px; width:260px; height:100%; background:var(--paper); z-index:40;
    transition:right .25s; padding:20px 16px; box-shadow:-4px 0 20px rgba(0,0,0,0.15);
  }
  .drawer.open{ right:0; }
  .drawer h3{ font-family:'Baloo 2',sans-serif; color:var(--ink); margin:0 0 16px; }
  body.night .drawer h3{ color:#fff; }
  .drawer-item{
    display:flex; align-items:center; gap:10px; padding:13px 8px; border-radius:9px; cursor:pointer;
    font-weight:600; font-size:14px; color:var(--charcoal);
  }
  .drawer-item:active{ background:var(--khaki-dark); }
  .toggle-switch{ margin-left:auto; width:38px; height:20px; background:var(--khaki-dark); border-radius:20px; position:relative; }
  .toggle-switch.on{ background:var(--gold); }
  .toggle-switch .dot{ width:16px; height:16px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; transition:left .15s; }
  .toggle-switch.on .dot{ left:20px; }

  .hidden{ display:none !important; }
  .empty{ text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Indian CSP Seva</h1>
  <button class="hamburger" onclick="openDrawer()">☰</button>
</div>

<div class="container">
  <div id="view-home">
    <div class="wallet-card">
      <div class="tape"></div>
      <div class="wallet-label">Wallet Balance</div>
      <div class="wallet-amt" id="wallet-amt">₹0</div>
      <button class="wallet-add-btn" onclick="showView('wallet')">+ Balance Add Karein</button>
    </div>
    <div class="section-title">Services</div>
    <div class="cat-grid" id="category-grid"></div>
  </div>

  <div id="view-services" class="hidden">
    <div class="back-link" onclick="showView('home')">← Wapas</div>
    <div class="section-title" id="services-cat-title">Services</div>
    <div id="services-list"></div>
  </div>

  <div id="view-form" class="hidden">
    <div class="back-link" onclick="showView('services')">← Wapas</div>
    <div class="section-title" id="form-title"></div>
    <div id="form-msg" class="msg"></div>
    <div id="dynamic-fields"></div>
    <button class="btn gold" onclick="submitServiceRequest()">Submit Karein</button>
  </div>

  <div id="view-wallet" class="hidden">
    <div class="back-link" onclick="showView('home')">← Wapas</div>
    <div class="section-title">Wallet</div>
    <div class="wallet-card"><div class="tape"></div>
      <div class="wallet-label">Current Balance</div>
      <div class="wallet-amt" id="wallet-amt-2">₹0</div>
    </div>
    <div id="wallet-msg" class="msg"></div>
    <div class="field"><label>Amount (₹)</label><input type="number" id="wallet-amount" placeholder="Kitna add karna hai"></div>
    <div class="field"><label>UTR / Reference Number</label><input type="text" id="wallet-utr" placeholder="Payment ka UTR/Ref number"></div>
    <button class="btn gold" onclick="submitWalletRequest()">Payment Details Submit Karein</button>
  </div>

  <div id="view-records" class="hidden">
    <div class="back-link" onclick="showView('home')">← Wapas</div>
    <div class="section-title">Print Records</div>
    <div id="records-list"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <h3>Menu</h3>
  <div class="drawer-item" onclick="showView('home'); closeDrawer();">🏠 Home</div>
  <div class="drawer-item" onclick="showView('wallet'); closeDrawer();">💰 Wallet</div>
  <div class="drawer-item" onclick="showView('records'); closeDrawer();">🖨️ Print Records</div>
  <div class="drawer-item" onclick="toggleNight()">
    🌙 Night Mode
    <div class="toggle-switch" id="night-toggle"><div class="dot"></div></div>
  </div>
  <div class="drawer-item" onclick="doLogout()" style="color:var(--red);">🚪 Logout</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, addDoc, collection, query, where, getDocs, orderBy
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDsQaWQEkkMRnxsWZou1BF_FYIKNiAHcIA",
    authDomain: "cspseva-f34f2.firebaseapp.com",
    projectId: "cspseva-f34f2",
    storageBucket: "cspseva-f34f2.firebasestorage.app",
    messagingSenderId: "280676555526",
    appId: "1:280676555526:web:08fcea69bd1698db95dc87"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let userData = null;
  let allServices = [];
  let currentCategory = null;
  let currentService = null;

  onAuthStateChanged(auth, async (user)=>{
    if(!user){ window.location.href = 'index.html'; return; }
    currentUser = user;
    const snap = await getDoc(doc(db,'users',user.uid));
    if(!snap.exists() || snap.data().status !== 'active'){
      window.location.href = 'index.html'; return;
    }
    userData = snap.data();
    document.getElementById('wallet-amt').textContent = '₹' + (userData.walletBalance ?? 0);
    document.getElementById('wallet-amt-2').textContent = '₹' + (userData.walletBalance ?? 0);
    if(localStorage && document.body){} // no-op, avoid storage errors
    loadCategories();
  });

  window.showView = function(view){
    ['home','services','form','wallet','records'].forEach(v=>{
      document.getElementById('view-'+v).classList.toggle('hidden', v!==view);
    });
    if(view==='records') loadRecords();
  }

  window.openDrawer = function(){
    document.getElementById('drawer').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }
  window.closeDrawer = function(){
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  window.toggleNight = function(){
    document.body.classList.toggle('night');
    document.getElementById('night-toggle').classList.toggle('on');
  }

  window.doLogout = async function(){
    await signOut(auth);
    window.location.href = 'index.html';
  }

  async function loadCategories(){
    const snap = await getDocs(collection(db,'services'));
    allServices = [];
    snap.forEach(d=> allServices.push({ id:d.id, ...d.data() }));
    const categories = {};
    allServices.forEach(s=>{
      categories[s.category] = (categories[s.category]||0) + 1;
    });
    const grid = document.getElementById('category-grid');
    const catNames = Object.keys(categories);
    if(catNames.length === 0){
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">Abhi koi service available nahi hai.</div>';
      return;
    }
    grid.innerHTML = catNames.map(cat => `
      <div class="cat-card" onclick="openCategory('${escapeHtml(cat)}')">
        <div class="icon">📋</div>
        <div class="cname">${escapeHtml(cat)}</div>
        <div class="ccount">${categories[cat]} service${categories[cat]>1?'s':''}</div>
      </div>`).join('');
  }

  window.openCategory = function(cat){
    currentCategory = cat;
    document.getElementById('services-cat-title').textContent = cat;
    const list = allServices.filter(s=>s.category===cat);
    const listEl = document.getElementById('services-list');
    listEl.innerHTML = list.map(s => `
      <div class="svc-card" onclick="openServiceForm('${s.id}')">
        ${s.logoUrl ? `<img class="svc-logo" src="${escapeHtml(s.logoUrl)}">` : `<div class="svc-logo"></div>`}
        <div>
          <div class="svc-name">${escapeHtml(s.name)}</div>
          <div class="svc-price">₹${s.price}</div>
        </div>
      </div>`).join('');
    showView('services');
  }

  window.openServiceForm = function(serviceId){
    currentService = allServices.find(s=>s.id===serviceId);
    document.getElementById('form-title').textContent = currentService.name + ' (₹' + currentService.price + ')';
    document.getElementById('form-msg').style.display = 'none';
    const fieldsEl = document.getElementById('dynamic-fields');
    const fields = currentService.fields && currentService.fields.length ? currentService.fields : ['Details'];
    fieldsEl.innerHTML = fields.map((f,i) => `
      <div class="field"><label>${escapeHtml(f)}</label><input type="text" class="dyn-input" data-field="${escapeHtml(f)}" placeholder="${escapeHtml(f)} daalein"></div>
    `).join('');
    showView('form');
  }

  window.submitServiceRequest = async function(){
    const inputs = document.querySelectorAll('.dyn-input');
    const formData = {};
    let hasEmpty = false;
    inputs.forEach(inp=>{
      if(!inp.value.trim()) hasEmpty = true;
      formData[inp.dataset.field] = inp.value.trim();
    });
    if(hasEmpty){ showFormMsg('Kripya sabhi fields bharein.', 'error'); return; }
    if((userData.walletBalance ?? 0) < currentService.price){
      showFormMsg('Wallet me paryapt balance nahi hai. Pehle wallet me balance add karein.', 'error');
      return;
    }
    try{
      await addDoc(collection(db,'serviceRequests'), {
        uid: currentUser.uid, name: userData.name, phone: userData.phone,
        serviceId: currentService.id, serviceName: currentService.name,
        category: currentService.category, price: currentService.price,
        formData, status: 'pending', submittedAt: new Date().toISOString()
      });
      showFormMsg('Request submit ho gayi! Admin verify karne ke baad status update hoga.', 'success');
      setTimeout(()=> showView('home'), 1500);
    }catch(err){
      showFormMsg('Kuch galat hua: ' + err.message, 'error');
    }
  }

  function showFormMsg(text, type){
    const el = document.getElementById('form-msg');
    el.textContent = text; el.className = 'msg ' + type;
  }

  // ---------- WALLET ----------
  window.submitWalletRequest = async function(){
    const amount = parseFloat(document.getElementById('wallet-amount').value);
    const utr = document.getElementById('wallet-utr').value.trim();
    const msgEl = document.getElementById('wallet-msg');
    if(isNaN(amount) || amount <= 0 || !utr){
      msgEl.textContent = 'Amount aur UTR dono zaroori hain.'; msgEl.className='msg error'; return;
    }
    try{
      await addDoc(collection(db,'walletRequests'), {
        uid: currentUser.uid, phone: userData.phone, amount, utr, status:'pending', submittedAt: new Date().toISOString()
      });
      msgEl.textContent = 'Payment details submit ho gaye. Admin verify karne ke baad balance add hoga.';
      msgEl.className = 'msg success';
      document.getElementById('wallet-amount').value='';
      document.getElementById('wallet-utr').value='';
    }catch(err){
      msgEl.textContent = 'Kuch galat hua: ' + err.message; msgEl.className = 'msg error';
    }
  }

  // ---------- PRINT RECORDS ----------
  async function loadRecords(){
    const listEl = document.getElementById('records-list');
    listEl.innerHTML = '<div class="empty">Loading...</div>';
    const q = query(collection(db,'serviceRequests'), where('uid','==', currentUser.uid));
    const snap = await getDocs(q);
    if(snap.empty){ listEl.innerHTML = '<div class="empty">Abhi koi service request nahi ki hai.</div>'; return; }
    let html = '';
    snap.forEach(d=>{
      const r = d.data();
      const badgeClass = r.status === 'success' ? 'success' : (r.status === 'failed' ? 'failed' : 'pending');
      html += `
        <div class="record-card">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
              <div class="svc-name">${escapeHtml(r.serviceName)}</div>
              <div class="ccount mono">Order ID: ${d.id.slice(0,10)}</div>
              <div class="ccount">₹${r.price}</div>
            </div>
            <span class="badge ${badgeClass}">${r.status.toUpperCase()}</span>
          </div>
          ${r.status==='failed' && r.failReason ? `<div class="ccount" style="margin-top:8px;color:var(--red-dark);">Reason: ${escapeHtml(r.failReason)}</div>` : ''}
          ${r.status==='success' && r.resultText ? `<div class="ccount" style="margin-top:8px;">${escapeHtml(r.resultText)}</div>` : ''}
          ${r.status==='success' && r.resultPdfUrl ? `<a href="${escapeHtml(r.resultPdfUrl)}" target="_blank" style="display:block;margin-top:6px;color:var(--red);font-weight:600;font-size:13px;">📄 PDF Download Karein</a>` : ''}
        </div>`;
    });
    listEl.innerHTML = html;
  }

  function escapeHtml(str){
    if(str === undefined || str === null) return '';
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
</script>
</body>
</html>
